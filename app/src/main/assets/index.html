<!DOCTYPE html>
<html lang="zh"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>TeenGuard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f5f6fa;color:#333;padding-bottom:70px}
.header{background:#1a237e;color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:22px}.header p{font-size:12px;opacity:.7}
.card{background:#fff;margin:12px 16px;border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.timer-circle{width:140px;height:140px;border-radius:50%;border:6px solid #4caf50;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px}
.timer-circle.warn{border-color:#ff9800}.timer-circle.danger{border-color:#f44336}
.timer-value{font-size:26px;font-weight:bold}.timer-label{font-size:11px;color:#888}
.status{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;margin:4px}
.status.safe{background:#e8f5e9;color:#388e3c}.status.warn{background:#fff3e0;color:#e65100}.status.danger{background:#ffebee;color:#c62828}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;text-align:center;cursor:pointer;margin:8px 0}
.btn-green{background:#4caf50;color:#fff}.btn-orange{background:#ff9800;color:#fff}.btn-red{background:#f44336;color:#fff}.btn-blue{background:#2196f3;color:#fff}.btn-gray{background:#e0e0e0;color:#666}.btn-outline{border:2px solid #f44336;color:#f44336;background:#fff}
.row{display:flex;gap:10px}.row .btn{flex:1}
.hidden{display:none!important}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:100;overflow-y:auto;padding:20px}
.screen-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.screen-header .back{font-size:22px;cursor:pointer;color:#2196f3}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#2196f3;border-radius:4px}
.locked-banner{background:#ffebee;border:2px solid #f44336;padding:20px;border-radius:12px;text-align:center;margin:16px 0}
.locked-banner .icon{font-size:50px}.locked-banner h3{color:#c62828;margin:8px 0;font-size:20px}
.challenge-card{background:#fff;padding:24px;border-radius:16px;text-align:center;border:2px solid #e3f2fd;margin:16px 0}
.challenge-card .question{font-size:28px;font-weight:bold;margin:16px 0}
.challenge-card input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:22px;text-align:center;margin:8px 0}
.phrase-card{background:#fff;padding:24px;border-radius:16px;text-align:center;border:2px solid #e8f5e9;margin:16px 0}
.phrase-card .target{font-size:22px;color:#2e7d32;font-weight:bold;margin:12px 0}.phrase-card .hint{font-size:14px;color:#999}
.record-btn{width:90px;height:90px;border-radius:50%;border:3px solid #e0e0e0;background:#f5f5f5;font-size:32px;cursor:pointer;margin:16px auto;display:flex;align-items:center;justify-content:center}
.record-btn.recording{background:#ffebee;border-color:#f44336}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:20px 0}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #ccc}.pin-dot.filled{background:#f44336;border-color:#f44336}
.num-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.num-btn{padding:18px;font-size:24px;border:1px solid #e0e0e0;background:#fff;border-radius:12px;cursor:pointer}.num-btn:active{background:#f0f0f0}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:50}
.nav-item{flex:1;text-align:center;padding:10px;font-size:12px;cursor:pointer;color:#888}.nav-item.active{color:#2196f3}.nav-item .icon{font-size:22px}
.diff-option{flex:1;padding:10px;border:2px solid #e0e0e0;border-radius:10px;text-align:center;cursor:pointer;font-size:14px}
.diff-option.selected{border-color:#2196f3;background:#e3f2fd;color:#2196f3}
.diff-row{display:flex;gap:8px;margin:8px 0}
input[type=number],input[type=password],select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:12px}
label{display:block;font-size:13px;color:#888;margin-bottom:4px;margin-top:8px}
.quick-set{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.quick-btn{padding:8px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer}.quick-btn.selected{background:#2196f3;color:#fff;border-color:#2196f3}
</style>
</head>
<body>
<div id="app"></div>
<div id="nav" class="nav-bar">
  <div class="nav-item active" onclick="showPage('home')"><div class="icon">🏠</div>首页</div>
  <div class="nav-item" onclick="showPage('lock')"><div class="icon">🔒</div>挑战</div>
  <div class="nav-item" onclick="showPage('settings')"><div class="icon">⚙️</div>设置</div>
</div>

<script>
const STATE={
  page:'home',gamingSeconds:0,isLocked:false,isMonitoring:false,
  settings:{dailyLimit:60,mathDifficulty:'medium',englishDifficulty:'medium',mathCount:3,englishCount:2},
  pinHash:'',challenge:{phase:'math',mathProblems:[],mathIndex:0,mathCorrect:0,englishPhrases:[],englishIndex:0,englishPass:0},
  settingsAuth:null,pinInput:'',showPinOnLock:false
};
function fmt(secs){const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;return h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return'tg_'+Math.abs(h).toString(16)}
function compareText(a,b){const la=a.toLowerCase().trim(),lb=b.toLowerCase().trim();if(la===lb)return 1;let m=0;for(let i=0;i<Math.min(la.length,lb.length);i++){if(la[i]===lb[i])m++}return m/Math.max(la.length,lb.length)}

function render(){
  const a=document.getElementById('app'),s=STATE;
  if(s.settingsAuth===false&&s.page==='settings'){a.innerHTML=pinGate();return}
  if(s.showPinOnLock){a.innerHTML=renderPinPad();return}
  a.innerHTML=s.page==='home'?renderHome():s.page==='lock'?renderLock():renderSettings();
}

function renderHome(){
  const s=STATE,limit=s.settings.dailyLimit*60,remain=Math.max(0,limit-s.gamingSeconds);
  const pct=limit>0?Math.min(100,(s.gamingSeconds/limit)*100):0,isDanger=s.gamingSeconds>=limit,isWarn=!isDanger&&pct>80;
  const cls=isDanger?'danger':isWarn?'warn':'';
  const quickTimes=[30,60,90,120,180];
  return`<div class="header"><h1>TeenGuard</h1><p>青少年游戏守护</p></div>
<div class="card" style="text-align:center">
  <div class="timer-circle ${cls}"><div class="timer-value" id="timer">${fmt(s.gamingSeconds)}</div><div class="timer-label">今日游戏时长</div></div>
  <div class="progress-bar" style="margin:12px 0"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${isDanger?'#f44336':isWarn?'#ff9800':'#4caf50'}"></div></div>
  <div style="font-size:12px;color:#888">今日限额 ${s.settings.dailyLimit}分钟 | 已用 ${fmt(s.gamingSeconds)} | 剩余 ${fmt(remain)}</div>
  <div style="margin-top:8px"><span class="status ${isDanger?'danger':isWarn?'warn':'safe'}">${s.isMonitoring?'🟢 监控中':'⚪ 未监控'} ${isDanger?'已超时':isWarn?'接近上限':'正常'}</span></div>
</div>
<div class="card">
  <label>⏱ 快速调整今日时限</label>
  <div class="quick-set">${quickTimes.map(t=>`<button class="quick-btn ${s.settings.dailyLimit===t?'selected':''}" onclick="quickSetLimit(${t})">${t}分钟</button>`).join('')}</div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
    <input type="number" id="quickLimit" value="${s.settings.dailyLimit}" min="5" max="480" style="flex:1;margin:0">
    <button class="btn btn-blue" style="width:80px;margin:0;padding:12px" onclick="quickSetLimit(parseInt(document.getElementById('quickLimit').value))">设定</button>
  </div>
</div>
<div class="card">
  ${!s.isMonitoring?`<button class="btn btn-green" onclick="startMonitor()">▶ 开始监控</button>`:`<button class="btn btn-orange" onclick="stopMonitor()">⏸ 停止监控</button>`}
  <button class="btn btn-red" onclick="manualLock()">🔒 手动锁定屏幕</button>
</div>
${isDanger?`<div class="locked-banner"><div class="icon">🔒</div><h3>游戏时间已超限！</h3><p>屏幕已锁定 | 完成挑战或输入密码解锁</p><button class="btn btn-red" onclick="showPage('lock')">去解锁</button></div>`:''}
<div class="card" style="font-size:13px;color:#888"><b>📌 说明</b><br>• 后台自动监控游戏时长<br>• 超时自动锁定屏幕<br>• 锁屏后需完成数学+英语挑战解锁<br>• 家长可用密码立即解锁<br>• 关机重启无法解除锁定</div>`;
}

function quickSetLimit(min){
  if(min<5||min>480||isNaN(min))return;
  STATE.settings.dailyLimit=min;
  if(window.TeenGuard)TeenGuard.saveSettings(JSON.stringify(STATE.settings));
  render();
}

function startMonitor(){
  if(window.TeenGuard){
    if(!TeenGuard.hasUsageStatsPermission()){TeenGuard.openUsageStatsSettings();alert('请先授予"使用情况访问"权限');return}
    TeenGuard.startMonitoring();STATE.isMonitoring=true;render();
  }
}
function stopMonitor(){if(window.TeenGuard){TeenGuard.stopMonitoring();STATE.isMonitoring=false;render()}}
function manualLock(){STATE.isLocked=true;STATE.challenge=genChallenge();if(window.TeenGuard)TeenGuard.lockScreen();showPage('lock')}

// ========== LOCK SCREEN ==========
function renderLock(){
  const c=STATE.challenge,total=STATE.settings.mathCount+STATE.settings.englishCount;
  const done=(c.phase==='math'?c.mathIndex:STATE.settings.mathCount+c.englishIndex),pct=Math.round((done/total)*100);
  if(c.phase==='complete')return`<div class="screen"><div style="text-align:center;padding-top:60px"><div style="font-size:60px">🎉</div><h2 style="margin:16px">挑战完成！</h2><p style="color:#666">请合理安排游戏时间</p><button class="btn btn-green" style="margin-top:24px" onclick="doUnlock()">✅ 解锁屏幕</button></div></div>`;
  if(c.phase==='math'){
    const p=c.mathProblems[c.mathIndex];if(!p)return'';
    return`<div class="screen"><div style="max-width:400px;margin:0 auto;padding-top:20px">
      <h3 style="text-align:center;color:#d32f2f">🔒 屏幕已锁定</h3>
      <p style="text-align:center;font-size:12px;color:#888">游戏时间已超限 | 关机重启无法解除</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <p style="text-align:center;font-size:12px;color:#888">数学 ${c.mathIndex+1}/${STATE.settings.mathCount} | ✅${c.mathCorrect}</p>
      <div class="challenge-card"><div class="question">${p.q}</div>
        <input id="mathAns" type="number" placeholder="输入答案" autofocus onkeydown="if(event.key==='Enter')submitMath()">
        <button class="btn btn-blue" onclick="submitMath()">提交答案</button>
        <p id="mathFb" style="margin-top:8px;font-size:14px"></p>
      </div>
      <button class="btn btn-outline" onclick="showPinOnLock()" style="margin-top:8px">🔑 输入家长密码直接解锁</button>
    </div></div>`;
  }
  if(c.phase==='english'){
    const p=c.englishPhrases[c.englishIndex];if(!p)return'';
    return`<div class="screen"><div style="max-width:400px;margin:0 auto;padding-top:20px">
      <h3 style="text-align:center;color:#d32f2f">🔒 屏幕已锁定</h3>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <p style="text-align:center;font-size:12px;color:#888">英语 ${c.englishIndex+1}/${STATE.settings.englishCount} | ✅${c.englishPass}</p>
      <div class="phrase-card"><p style="font-size:13px;color:#666">请大声朗读：</p>
        <div class="target">${p.t}</div><div class="hint">💡 ${p.h}</div>
        <button id="spkBtn" class="record-btn" onclick="simSpeech()">🎤</button>
        <p id="spkRes" style="margin:8px;font-size:14px;color:#666"></p>
        <button class="btn btn-green" onclick="submitSpeech()">确认提交</button>
      </div>
      <button class="btn btn-outline" onclick="showPinOnLock()" style="margin-top:8px">🔑 输入家长密码直接解锁</button>
    </div></div>`;
  }
}

function genChallenge(){
  const mp=[],diff=STATE.settings.mathDifficulty;
  for(let i=0;i<STATE.settings.mathCount;i++){let a,b,q,ans;if(diff==='easy'){a=rand(1,50);b=rand(1,50);ans=a+b;q=`${a}+${b}`}else if(diff==='medium'){a=rand(2,12);b=rand(2,12);ans=a*b;q=`${a}×${b}`}else{a=rand(1,20);b=rand(1,20);const c=rand(1,10);ans=a*b+c;q=`${a}×${b}+${c}`}mp.push({q:q+'=?',a:ans})}
  const pool={easy:[{t:'hello',h:'你好'},{t:'thank you',h:'谢谢'},{t:'good morning',h:'早上好'},{t:'I am happy',h:'我很快乐'},{t:'good night',h:'晚安'}],medium:[{t:'The weather is beautiful today',h:'今天天气很好'},{t:'I enjoy playing with friends',h:'我喜欢和朋友玩'},{t:'Reading books is fun',h:'读书很有趣'},{t:'Practice makes perfect',h:'熟能生巧'}],hard:[{t:'Technology has changed how people communicate',h:'科技改变了交流方式'},{t:'Environmental protection is important',h:'环保很重要'}]};
  const ep=pool[STATE.settings.englishDifficulty]||pool.medium;return{phase:'math',mathProblems:mp,mathIndex:0,mathCorrect:0,englishPhrases:ep.sort(()=>Math.random()-.5).slice(0,STATE.settings.englishCount),englishIndex:0,englishPass:0};
}

function submitMath(){
  const fb=document.getElementById('mathFb'),p=STATE.challenge.mathProblems[STATE.challenge.mathIndex];
  const u=parseFloat(document.getElementById('mathAns').value);
  if(isNaN(u)){fb.innerHTML='❌ 请输入数字';return}
  if(Math.abs(u-p.a)<0.01){STATE.challenge.mathCorrect++;fb.innerHTML='✅ 正确！'}else{fb.innerHTML=`❌ 正确答案是 ${p.a}`}
  STATE.challenge.mathIndex++;
  if(STATE.challenge.mathIndex>=STATE.settings.mathCount)STATE.challenge.phase='english';
  setTimeout(()=>render(),800);
}

let simSp='';
function simSpeech(){
  const p=STATE.challenge.englishPhrases[STATE.challenge.englishIndex],b=document.getElementById('spkBtn');
  b.textContent='⏺';b.classList.add('recording');document.getElementById('spkRes').innerHTML='🎙 聆听中...';
  setTimeout(()=>{simSp=p.t;document.getElementById('spkRes').innerHTML=`识别: "${simSp}"`;b.textContent='🎤';b.classList.remove('recording')},1500);
}
function submitSpeech(){
  const p=STATE.challenge.englishPhrases[STATE.challenge.englishIndex];
  if(!simSp){alert('请先录音');return}
  if(compareText(simSp,p.t)>0.6)STATE.challenge.englishPass++;
  STATE.challenge.englishIndex++;simSp='';
  if(STATE.challenge.englishIndex>=STATE.settings.englishCount)STATE.challenge.phase='complete';
  render();
}
function doUnlock(){STATE.isLocked=false;STATE.gamingSeconds=0;if(window.TeenGuard){TeenGuard.unlockScreen();TeenGuard.resetTimer()}showPage('home')}

// ========== PIN PAD ==========
function showPinOnLock(){STATE.showPinOnLock=true;STATE.pinInput='';render()}
function renderPinPad(){
  return`<div class="screen"><div style="text-align:center;padding-top:40px">
    <h3 style="color:#d32f2f">🔑 家长密码解锁</h3><p style="color:#888;font-size:13px;margin:4px 0">输入4位密码立即解锁屏幕</p>
    <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot ${i<STATE.pinInput.length?'filled':''}"></div>`).join('')}</div>
    <div class="num-pad">${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(n=>`<button class="num-btn" onclick="${n===''?'':n==='⌫'?'pinDel()':'pinPress('+n+')'}" ${n===''?'disabled':''}>${n===''?'':n}</button>`).join('')}</div>
    <p id="pinErr" style="color:#f44336;margin-top:8px;font-size:14px"></p>
    <button class="btn btn-gray" style="max-width:260px;margin:12px auto" onclick="STATE.showPinOnLock=false;STATE.pinInput='';render()">返回挑战</button>
  </div></div>`;
}
function pinPress(n){STATE.pinInput+=String(n);if(STATE.pinInput.length>=4)verifyLockPin();render()}
function pinDel(){STATE.pinInput=STATE.pinInput.slice(0,-1);render()}
function verifyLockPin(){
  if(simpleHash(STATE.pinInput)===STATE.pinHash||STATE.pinHash===''){
    STATE.isLocked=false;STATE.showPinOnLock=false;STATE.pinInput='';
    if(window.TeenGuard){TeenGuard.unlockScreen();TeenGuard.resetTimer()}
    alert('✅ 密码正确，屏幕已解锁！');showPage('home');
  }else{STATE.pinInput='';document.getElementById('pinErr').textContent='❌ 密码错误，请重试'}
}

// ========== SETTINGS ==========
function pinGate(){
  return`<div class="screen"><div style="text-align:center;padding-top:60px">
    <div style="font-size:50px">🔐</div><h3 style="margin:16px">家长密码</h3>
    <input id="pinGate" type="password" maxlength="4" placeholder="输入4位密码" style="text-align:center;font-size:24px;letter-spacing:8px;width:200px" oninput="checkPin(this.value)">
    <p id="pinGateErr" style="color:#f44336;margin-top:8px"></p>
    <button class="btn btn-gray" style="width:200px;margin:12px auto" onclick="STATE.settingsAuth=null;showPage('home')">返回</button>
  </div></div>`;
}
function checkPin(v){
  if(v.length===4){
    if(simpleHash(v)===STATE.pinHash||STATE.pinHash===''){STATE.settingsAuth=true;render()}
    else{document.getElementById('pinGateErr').textContent='密码错误';document.getElementById('pinGate').value=''}
  }
}

function renderSettings(){
  const s=STATE.settings,d=['easy','medium','hard'],dl={easy:'简单',medium:'中等',hard:'困难'};
  return`<div class="screen"><div style="max-width:400px;margin:0 auto">
    <div class="screen-header"><span class="back" onclick="showPage('home')">←</span><h2>家长设置</h2></div>
    <div class="card"><label>⏱ 每日游戏时限（分钟）</label><input id="sLimit" type="number" value="${s.dailyLimit}" min="5" max="480"></div>
    <div class="card" id="mathDiff"><label>📐 数学难度</label><div class="diff-row">${d.map(x=>`<div class="diff-option ${s.mathDifficulty===x?'selected':''}" onclick="selDiff('math','${x}')">${dl[x]}</div>`).join('')}</div></div>
    <div class="card" id="engDiff"><label>🗣 英语难度</label><div class="diff-row">${d.map(x=>`<div class="diff-option ${s.englishDifficulty===x?'selected':''}" onclick="selDiff('eng','${x}')">${dl[x]}</div>`).join('')}</div></div>
    <div class="card"><label>📝 数学题数 / 🎤 英语题数</label><div class="row"><input id="sMC" type="number" value="${s.mathCount}" min="1" max="10"><input id="sEC" type="number" value="${s.englishCount}" min="1" max="10"></div></div>
    <div class="card"><label>🔑 家长密码（4位数字）</label><input id="sPin" type="password" maxlength="4" placeholder="留空不修改"></div>
    <button class="btn btn-blue" onclick="saveSettings()">💾 保存设置</button>
    <button class="btn btn-gray" onclick="showPage('home')">返回首页</button>
  </div></div>`;
}
function selDiff(type,val){if(type==='math')STATE.settings.mathDifficulty=val;else STATE.settings.englishDifficulty=val;render()}
function saveSettings(){
  const lim=parseInt(document.getElementById('sLimit').value),mc=parseInt(document.getElementById('sMC').value),ec=parseInt(document.getElementById('sEC').value),p=document.getElementById('sPin').value;
  if(lim<5||lim>480){alert('时限5-480分钟');return}
  STATE.settings.dailyLimit=lim;STATE.settings.mathCount=mc||3;STATE.settings.englishCount=ec||2;
  if(p.length===4)STATE.pinHash=simpleHash(p);
  if(window.TeenGuard){TeenGuard.saveSettings(JSON.stringify(STATE.settings));if(STATE.pinHash)TeenGuard.savePinHash(STATE.pinHash)}
  alert('设置已保存！');showPage('home');
}

// ========== NAV ==========
function showPage(p){
  STATE.page=p;
  if(p==='lock'&&!STATE.isLocked){STATE.isLocked=true;STATE.challenge=genChallenge();if(window.TeenGuard)TeenGuard.lockScreen()}
  document.querySelectorAll('.nav-item').forEach((e,i)=>e.classList.toggle('active',['home','lock','settings'][i]===p));
  STATE.showPinOnLock=false;STATE.pinInput='';render();
}

// ========== INIT ==========
function init(){
  if(window.TeenGuard){
    try{const s=JSON.parse(TeenGuard.getSettings()||'{}');if(s.dailyLimit)STATE.settings={...STATE.settings,...s};STATE.pinHash=TeenGuard.getPinHash()||''}catch(e){}
    STATE.isMonitoring=TeenGuard.hasUsageStatsPermission();
  }
  render();
  setInterval(()=>{
    if(window.TeenGuard&&STATE.isMonitoring){
      STATE.gamingSeconds=TeenGuard.getTodayGamingSeconds();
      const limit=STATE.settings.dailyLimit*60;
      if(STATE.gamingSeconds>=limit&&!STATE.isLocked){STATE.isLocked=true;STATE.challenge=genChallenge();if(window.TeenGuard)TeenGuard.lockScreen();showPage('lock');return}
      if(STATE.page==='home')render();
    }
  },1000);
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
