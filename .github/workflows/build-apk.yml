name: Build APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}

      - name: Setup Gradle
        run: |
          mkdir -p ~/.gradle
          curl -sL https://services.gradle.org/distributions/gradle-8.2.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-8.2.1/bin" >> $GITHUB_PATH

      - name: Generate keystore
        run: |
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=TG"

      - name: Build APK
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with: {name: TeenGuard-APK, path: app/build/outputs/apk/release/app-release.apk}